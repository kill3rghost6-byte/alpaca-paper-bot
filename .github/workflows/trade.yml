name: Alpaca Live Trading Bot

on:
  schedule:
    # Runs every 5 minutes from 13:00 to 20:00 UTC (9:00 AM to 4:00 PM EST) Monday to Friday
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Trading Bot
        run: python alpaca_live_bot.py
